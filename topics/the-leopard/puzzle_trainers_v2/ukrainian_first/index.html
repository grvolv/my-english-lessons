_en.wav", "duration": 7.147333}, "ua": {"id": "scene-021-ua-sentence", "text": "Згодом дитинчата починають ходити за матір’ю крізь траву й уважно спостерігають, як вона наближається до здобичі та рухається безшумно.", "text_sha256": "59af6bd825796ae826cd4e78028a25c5237ac703f18bb61fc0e3ff06f508cd7c", "audio": "../../puzzle_audio_v2/sentences/ua/scene_021_sentence_ua.mp3", "duration": 8.952}}, "blocks": {"en": [{"id": "scene-021-en-block-001", "position": 1, "text": "Later,", "text_sha256": "08edb7d522f736fa0734b788a51d95ae5bdff1d492371db9909ca636e5e44d1d", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_001.wav"}, {"id": "scene-021-en-block-002", "position": 2, "text": "the cubs begin following", "text_sha256": "e2a80a160b87cc29af738bb454fd5f98dabb2028c5df460d33d07059139a46a1", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_002.wav"}, {"id": "scene-021-en-block-003", "position": 3, "text": "their mother", "text_sha256": "d95d2ed9abc850b5f4878795cede5bd54eed855b08a118d5b77e01d3942d9114", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_003.wav"}, {"id": "scene-021-en-block-004", "position": 4, "text": "through the grass,", "text_sha256": "07cce50b8d151908b48beac8fef1776b14f8e7dd204e2ceeacfa72ffa5ad1a38", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_004.wav"}, {"id": "scene-021-en-block-005", "position": 5, "text": "watching closely", "text_sha256": "8c2d1720f4a970b7f89809e8ae8d292bdba00452042612447ab323bd5c8bfd38", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_005.wav"}, {"id": "scene-021-en-block-006", "position": 6, "text": "as she approaches prey", "text_sha256": "1df4df5ac29269585422c325a33aa98e7cde15dcf18bdebfeebf26c4daafb462", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_006.wav"}, {"id": "scene-021-en-block-007", "position": 7, "text": "and moves without sound.", "text_sha256": "b04f7aaa0d88d483acb4da34751af5d5acfcc0794ee743a7abf27c73a07ece61", "audio": "../../puzzle_audio_v2/blocks/en/scene_021_block_en_007.wav"}], "ua": [{"id": "scene-021-ua-block-001", "position": 1, "text": "Згодом", "text_sha256": "70ac0b3ed8b61295d441ca10fe6f03ef9b3e55028290938663f6e51cd1dfcd04", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_001.mp3"}, {"id": "scene-021-ua-block-002", "position": 2, "text": "дитинчата починають", "text_sha256": "76ad71d113d58601e98cb54ae95e3b930da99f94e981010a7a12a636cf352ca8", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_002.mp3"}, {"id": "scene-021-ua-block-003", "position": 3, "text": "ходити за матір’ю", "text_sha256": "4e3643f4adc6bd8929c32d5edba16c3d0459ddeea9247ebdaa71c306b5c986ef", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_003.mp3"}, {"id": "scene-021-ua-block-004", "position": 4, "text": "крізь траву", "text_sha256": "e6803a58db1115cf8b1f401e6b34365e0bfdc95e60e8cce1a3a1412bf7e8066d", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_004.mp3"}, {"id": "scene-021-ua-block-005", "position": 5, "text": "й уважно спостерігають,", "text_sha256": "587efe8a915aede2ed394e5ad32425ebbf985dee78fdc0b32caf3f54a51f8c2b", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_005.mp3"}, {"id": "scene-021-ua-block-006", "position": 6, "text": "як вона наближається до здобичі", "text_sha256": "b1d3e864b1fa9d0d6e0b426271cdc0f39b03940998d98a0778cb0870bfbc5508", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_006.mp3"}, {"id": "scene-021-ua-block-007", "position": 7, "text": "та рухається безшумно.", "text_sha256": "4d2f50c61bd66bad81edef3b965fa56bb1ff55864db5614f56439a2f41308059", "audio": "../../puzzle_audio_v2/blocks/ua/scene_021_block_ua_007.mp3"}]}}, {"scene": 22, "sentences": {"en": {"id": "scene-022-en-sentence", "text": "Even under her protection, many cubs do not survive attacks from lions, hyenas, and other predators.", "text_sha256": "69fe5d18b530929ae43f3a696bd076107c7f496c9793694f35127503110b93ee", "audio": "../../puzzle_audio_v2/sentences/en/scene_022_sentence_en.wav", "duration": 6.496667}, "ua": {"id": "scene-022-ua-sentence", "text": "Навіть під її захистом багато дитинчат не переживають нападів левів, гієн та інших хижаків.", "text_sha256": "b11a0e1702132a6c4f6d089e80fa4370029ec7940d61c4f10a7222ddb9c96680", "audio": "../../puzzle_audio_v2/sentences/ua/scene_022_sentence_ua.mp3", "duration": 6.6}}, "blocks": {"en": [{"id": "scene-022-en-block-001", "position": 1, "text": "Even under her protection,", "text_sha256": "20f163acadb50e964d5086fc3d6db528183306e2f4d5777159796558b07ce4ee", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_001.wav"}, {"id": "scene-022-en-block-002", "position": 2, "text": "many cubs", "text_sha256": "f38c587b98f802c5eb61a1cb884162e65db43645e575470952875a0f536b4ac3", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_002.wav"}, {"id": "scene-022-en-block-003", "position": 3, "text": "do not survive", "text_sha256": "91fe0a1270c16905454ca9e913bf657b7c289be1ac82f6a5778d6dfc93e95acb", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_003.wav"}, {"id": "scene-022-en-block-004", "position": 4, "text": "attacks from lions,", "text_sha256": "0a0ecc35504931465a3eb74389497b983a338940a247c7ed47321c8e66592aca", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_004.wav"}, {"id": "scene-022-en-block-005", "position": 5, "text": "hyenas,", "text_sha256": "19d3a7c226c7a3665be6f3a45006bdad2273ccdaa141b2896bfd5acaffab7462", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_005.wav"}, {"id": "scene-022-en-block-006", "position": 6, "text": "and other predators.", "text_sha256": "b77d6bd4b838f937fe19ddc5649195a4c8e5033bb3127236aa3ad67f51087637", "audio": "../../puzzle_audio_v2/blocks/en/scene_022_block_en_006.wav"}], "ua": [{"id": "scene-022-ua-block-001", "position": 1, "text": "Навіть під її захистом", "text_sha256": "ad9c5c55db9cf49e2f3ce86a2871967e0d326095220e7c1efce8a06db663353a", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_001.mp3"}, {"id": "scene-022-ua-block-002", "position": 2, "text": "багато дитинчат", "text_sha256": "3e51acbc15a577e801e2dfb7fd4ef528de994fb04065891262ff660b2c1d0f2d", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_002.mp3"}, {"id": "scene-022-ua-block-003", "position": 3, "text": "не переживають", "text_sha256": "1f0ea021be2fc50becad636949d1f0328f281ff27903cd291bc743fdf3ad6e7d", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_003.mp3"}, {"id": "scene-022-ua-block-004", "position": 4, "text": "нападів левів,", "text_sha256": "6161eb4010a456adc917896cff390c44db3e75d2e676c71383d14c0fde391d72", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_004.mp3"}, {"id": "scene-022-ua-block-005", "position": 5, "text": "гієн", "text_sha256": "faa10350293fdbcc6af452a500a7fde1c6026352b49f0c28e65664c9b13abef4", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_005.mp3"}, {"id": "scene-022-ua-block-006", "position": 6, "text": "та інших хижаків.", "text_sha256": "15e631083c67c74809c4719e1a2e8880fa6f2d63d8f6c5f9547bd0db4bf1340d", "audio": "../../puzzle_audio_v2/blocks/ua/scene_022_block_ua_006.mp3"}]}}, {"scene": 23, "sentences": {"en": {"id": "scene-023-en-sentence", "text": "Those that survive remain with their mother for roughly eighteen months, learning how to hunt and live independently.", "text_sha256": "131924d74f841aceda0e4fbc5ff62e9c2be89fd78e0d42adfa6452e7afbb7abc", "audio": "../../puzzle_audio_v2/sentences/en/scene_023_sentence_en.wav", "duration": 7.467333}, "ua": {"id": "scene-023-ua-sentence", "text": "Ті, що виживають, залишаються з матір’ю приблизно вісімнадцять місяців, навчаючись полювати й жити самостійно.", "text_sha256": "eebb375205ba9841ea4394114a075ecfb29d605825135fce245b02c571be3a71", "audio": "../../puzzle_audio_v2/sentences/ua/scene_023_sentence_ua.mp3", "duration": 8.136}}, "blocks": {"en": [{"id": "scene-023-en-block-001", "position": 1, "text": "Those that survive", "text_sha256": "e99619322e5073ab449c35ae9145e1383005714d44c5f73303297337bd05b254", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_001.wav"}, {"id": "scene-023-en-block-002", "position": 2, "text": "remain with their mother", "text_sha256": "06e0f4945331c83c48a8dcfb4503d03aeaa12fa3664e51037d3d3ccf138fc68a", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_002.wav"}, {"id": "scene-023-en-block-003", "position": 3, "text": "for roughly eighteen months,", "text_sha256": "c1d90617652af0b5507ebee3413f5e160b70cc9975ddb8bcab351c9de1b1071c", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_003.wav"}, {"id": "scene-023-en-block-004", "position": 4, "text": "learning", "text_sha256": "edd95740e339e6aa0a1dab45741b0521185680b051631a7c265b5630da4f2158", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_004.wav"}, {"id": "scene-023-en-block-005", "position": 5, "text": "how to hunt", "text_sha256": "77f7e4b75b8a301667d8fffdc94fec7016c4c1063c665a946a1f399959d36620", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_005.wav"}, {"id": "scene-023-en-block-006", "position": 6, "text": "and live independently.", "text_sha256": "94f8f4dd043880d47ce01129b4785f7094369e3bc32394b28a9ae3886b6d7f2b", "audio": "../../puzzle_audio_v2/blocks/en/scene_023_block_en_006.wav"}], "ua": [{"id": "scene-023-ua-block-001", "position": 1, "text": "Ті, що виживають,", "text_sha256": "57534c589e8830a89316ed432ba2ddef716f9d3852e5042ce1b14e71b5461fef", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_001.mp3"}, {"id": "scene-023-ua-block-002", "position": 2, "text": "залишаються з матір’ю", "text_sha256": "5ce49174556c271ebfd6295ca83a5fc190dadd278f0163e0d4b384aacb47f7ab", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_002.mp3"}, {"id": "scene-023-ua-block-003", "position": 3, "text": "приблизно вісімнадцять місяців,", "text_sha256": "1ba8fe0f65afa6e4e2135d353944e4809843fd06387134133b23ffc3c1cfd810", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_003.mp3"}, {"id": "scene-023-ua-block-004", "position": 4, "text": "навчаючись", "text_sha256": "a236bbd010c59efc273244a97a4491494f6681b0b10346dc24148913d79d77fd", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_004.mp3"}, {"id": "scene-023-ua-block-005", "position": 5, "text": "полювати", "text_sha256": "7f8f8c853316cc019403b7235481db3e21eeeb59809a509452c114c3794e191e", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_005.mp3"}, {"id": "scene-023-ua-block-006", "position": 6, "text": "й жити самостійно.", "text_sha256": "342536975668ceebb68549b4cdcd41135ec7d1c658ca0cf3102ccf5cbe12dff3", "audio": "../../puzzle_audio_v2/blocks/ua/scene_023_block_ua_006.mp3"}]}}, {"scene": 24, "sentences": {"en": {"id": "scene-024-en-sentence", "text": "At last, the young leopards leave her territory and disappear into the wilderness in search of solitary ranges of their own.", "text_sha256": "f47839797d717becf37a95a0cb5bb4fa2d3f5fc3f64bb79af6d9ef803a0c9afd", "audio": "../../puzzle_audio_v2/sentences/en/scene_024_sentence_en.wav", "duration": 8.352667}, "ua": {"id": "scene-024-ua-sentence", "text": "Зрештою молоді леопарди залишають її територію та зникають у дикій природі в пошуках власних одиночних володінь.", "text_sha256": "62f3b5035aac16d6324423425c707990214e085aaa910a541a80bfbb3c644f03", "audio": "../../puzzle_audio_v2/sentences/ua/scene_024_sentence_ua.mp3", "duration": 7.536}}, "blocks": {"en": [{"id": "scene-024-en-block-001", "position": 1, "text": "At last,", "text_sha256": "050dc8606dd4594ef7e24e89b59e1029c07be4ac5b5c442aef89cd3c6413b376", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_001.wav"}, {"id": "scene-024-en-block-002", "position": 2, "text": "the young leopards", "text_sha256": "fcf712e9cb9cf9f4ade830de5ab69425bdfa096b23e3721a07f02ebde3a0199c", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_002.wav"}, {"id": "scene-024-en-block-003", "position": 3, "text": "leave her territory", "text_sha256": "13febb480b6a37cbbeb251366bd2e2f4da80528371d508d66224f0eace61dd98", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_003.wav"}, {"id": "scene-024-en-block-004", "position": 4, "text": "and disappear", "text_sha256": "d45238b70e5706d19c253b822bbfe2dc95caf66d32781ed0ddc6f22699560f76", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_004.wav"}, {"id": "scene-024-en-block-005", "position": 5, "text": "into the wilderness", "text_sha256": "fe7d86f5a7188d3dc992b6e7fba107075a5c3e76e0b6b7604b933669338be670", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_005.wav"}, {"id": "scene-024-en-block-006", "position": 6, "text": "in search of", "text_sha256": "10cf6797767e0d82672e076cb4cbfde3ffd5a039e3a4869d4ba83d905cf08bef", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_006.wav"}, {"id": "scene-024-en-block-007", "position": 7, "text": "solitary ranges of their own.", "text_sha256": "ab2430b2cb8f7173b3118c2249e3a622bd15611f4ea5444221d5e1a73462e019", "audio": "../../puzzle_audio_v2/blocks/en/scene_024_block_en_007.wav"}], "ua": [{"id": "scene-024-ua-block-001", "position": 1, "text": "Зрештою", "text_sha256": "1406852fe4bd5fb9a019fd23b6ff811ddc7e708bbb01174bfa85aa01e2a640f1", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_001.mp3"}, {"id": "scene-024-ua-block-002", "position": 2, "text": "молоді леопарди", "text_sha256": "89ef7ff8a573f121e122109f85532b4a1580cb61d97c7095f08b9a93763583d1", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_002.mp3"}, {"id": "scene-024-ua-block-003", "position": 3, "text": "залишають її територію", "text_sha256": "a29e227fff853d31cdd0473a6ff8f71df7c3ad9a9243f24054ff5aa0d8fe4c4a", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_003.mp3"}, {"id": "scene-024-ua-block-004", "position": 4, "text": "та зникають", "text_sha256": "71f324cb203e371f96b22a15e8ce06886dabab363b4c7eea062f35e2ea797a8e", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_004.mp3"}, {"id": "scene-024-ua-block-005", "position": 5, "text": "у дикій природі", "text_sha256": "c941ce86a89fccaf7925f079b0e4d5996c7c8ec34c3dac66309bf4759301a3a2", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_005.mp3"}, {"id": "scene-024-ua-block-006", "position": 6, "text": "в пошуках", "text_sha256": "25dd71bee6ad0022b028b255912f16a8fe37951b2f21412cc74427c2d375773c", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_006.mp3"}, {"id": "scene-024-ua-block-007", "position": 7, "text": "власних одиночних володінь.", "text_sha256": "baa9f4242d62c0a58db94d9c1cda68d317cfaf0743cad33721260d893d5e95d3", "audio": "../../puzzle_audio_v2/blocks/ua/scene_024_block_ua_007.mp3"}]}}, {"scene": 25, "sentences": {"en": {"id": "scene-025-en-sentence", "text": "Their future, however, is becoming more uncertain as farms, roads, and expanding settlements divide natural habitats into smaller fragments.", "text_sha256": "d941ada5921bc8a1461ced830892a1a02923c36a325590e5e85c7218259fd394", "audio": "../../puzzle_audio_v2/sentences/en/scene_025_sentence_en.wav", "duration": 10.678}, "ua": {"id": "scene-025-ua-sentence", "text": "Однак їхнє майбутнє стає дедалі невизначенішим, оскільки ферми, дороги й поселення розділяють природні середовища на все менші ділянки.", "text_sha256": "b0ffee90cfa7b8ab6d64d8645bf99b61120f2f2182351b2c1651aa0ff86159d8", "audio": "../../puzzle_audio_v2/sentences/ua/scene_025_sentence_ua.mp3", "duration": 9.384}}, "blocks": {"en": [{"id": "scene-025-en-block-001", "position": 1, "text": "Their future,", "text_sha256": "82a5f0a0bc989bb5ff2543067ce607b6dc1909d0ea5c81b7b76257972bd8d6e4", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_001.wav"}, {"id": "scene-025-en-block-002", "position": 2, "text": "however,", "text_sha256": "4860ed8c70b23f76771f0681d90724ce76e5c2a97c99f459b574117522a0b4f6", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_002.wav"}, {"id": "scene-025-en-block-003", "position": 3, "text": "is becoming more uncertain", "text_sha256": "12d39493fc05d0b50a8574c41b3f9fc51f4f8f6de95a014114829661ea8dd4ed", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_003.wav"}, {"id": "scene-025-en-block-004", "position": 4, "text": "as farms,", "text_sha256": "2c2e85142822898072b7b499ca4ae7657ef6f68f2c76e873d5728bb09b4e4fc4", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_004.wav"}, {"id": "scene-025-en-block-005", "position": 5, "text": "roads,", "text_sha256": "0e717385cf8a105ea717d8b3cfc7863d3cb5cd2d98928a63cba30b44a5ca5280", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_005.wav"}, {"id": "scene-025-en-block-006", "position": 6, "text": "and expanding settlements", "text_sha256": "7abd619d262f229fa9d0b042300048301bac128b9c496b8ab1332d02c9b8d384", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_006.wav"}, {"id": "scene-025-en-block-007", "position": 7, "text": "divide natural habitats", "text_sha256": "2f3f1dbba054ce7530ade8224b897075625247341586c1043aac7953e9d9779f", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_007.wav"}, {"id": "scene-025-en-block-008", "position": 8, "text": "into smaller fragments.", "text_sha256": "9f3047df7fac18addb913e9527a928fdf36b4c74de5605e576a77d074fc24aff", "audio": "../../puzzle_audio_v2/blocks/en/scene_025_block_en_008.wav"}], "ua": [{"id": "scene-025-ua-block-001", "position": 1, "text": "Однак", "text_sha256": "c634a99b74a7462389db6334636ab49c62d143201d7d8d51accd5897db3252d1", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_001.mp3"}, {"id": "scene-025-ua-block-002", "position": 2, "text": "їхнє майбутнє", "text_sha256": "fec227c75f87f4aee20243d6b82875410ef8f813504008aa671c6ce57cb2b984", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_002.mp3"}, {"id": "scene-025-ua-block-003", "position": 3, "text": "стає дедалі невизначенішим,", "text_sha256": "daa6b389a3ab4da6faa813b5dc7acf3538027ecabcf63d3c3008a7d5be8ea01a", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_003.mp3"}, {"id": "scene-025-ua-block-004", "position": 4, "text": "оскільки ферми,", "text_sha256": "bd54fcc92219b11f929dab2714eee2f94213acfca3e05954df968526c3b162f7", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_004.mp3"}, {"id": "scene-025-ua-block-005", "position": 5, "text": "дороги й поселення", "text_sha256": "f2fbc32f2d702902b600e189021334f204e149a7c31c495bebe4e4388a049cd0", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_005.mp3"}, {"id": "scene-025-ua-block-006", "position": 6, "text": "розділяють", "text_sha256": "deee21908facb3561ce750bc37c354e42dd1f969728ebb7b1e6d7b5f80d4122c", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_006.mp3"}, {"id": "scene-025-ua-block-007", "position": 7, "text": "природні середовища", "text_sha256": "fac3170ae74a3c07cf1578a81e4cea697895adee563f3e566362ffd8a7f29e38", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_007.mp3"}, {"id": "scene-025-ua-block-008", "position": 8, "text": "на все менші ділянки.", "text_sha256": "31ea329cdefc4b311f9110232500a40fcb0e167c2e2047950fd1c24d1fff137b", "audio": "../../puzzle_audio_v2/blocks/ua/scene_025_block_ua_008.mp3"}]}}, {"scene": 26, "sentences": {"en": {"id": "scene-026-en-sentence", "text": "As wild prey declines, some leopards begin hunting livestock near villages and grazing lands.", "text_sha256": "ed371812e42defbf40c8b51f6f3598a674ead1c9f4ae0c6aa1681b79653f7055", "audio": "../../puzzle_audio_v2/sentences/en/scene_026_sentence_en.wav", "duration": 7.051333}, "ua": {"id": "scene-026-ua-sentence", "text": "Коли кількість дикої здобичі скорочується, деякі леопарди починають полювати на домашню худобу поблизу сіл і пасовищ.", "text_sha256": "7a1d989bd2cc9153e6e1b2a46fb9a7a410cb3658f32ede17ea09066aaeccde6f", "audio": "../../puzzle_audio_v2/sentences/ua/scene_026_sentence_ua.mp3", "duration": 8.088}}, "blocks": {"en": [{"id": "scene-026-en-block-001", "position": 1, "text": "As wild prey declines,", "text_sha256": "a76a468369343a2041d13ec95f5d6e541a52e5382a8d1e240c35c6a0bb23e87c", "audio": "../../puzzle_audio_v2/blocks/en/scene_026_block_en_001.wav"}, {"id": "scene-026-en-block-002", "position": 2, "text": "some leopards", "text_sha256": "8833f36da2be6b2bd16ef23ff5ad8f21edccd375042386eecd2ed96f411e62fd", "audio": "../../puzzle_audio_v2/blocks/en/scene_026_block_en_002.wav"}, {"id": "scene-026-en-block-003", "position": 3, "text": "begin hunting livestock", "text_sha256": "601d6f901b70af2d0d1eb480d45f3b687e575503a9acc80d6d3f60ed90a6e6b4", "audio": "../../puzzle_audio_v2/blocks/en/scene_026_block_en_003.wav"}, {"id": "scene-026-en-block-004", "position": 4, "text": "near villages", "text_sha256": "18d3345d21b1d3a39bd095feee9f27a4795c29684b12ccc6f7cb4ed2656a6e99", "audio": "../../puzzle_audio_v2/blocks/en/scene_026_block_en_004.wav"}, {"id": "scene-026-en-block-005", "position": 5, "text": "and grazing lands.", "text_sha256": "91951938ca2c3ea861d96902eb75857a5ef5f6e88b1f6eef54495b701923a65b", "audio": "../../puzzle_audio_v2/blocks/en/scene_026_block_en_005.wav"}], "ua": [{"id": "scene-026-ua-block-001", "position": 1, "text": "Коли кількість дикої здобичі", "text_sha256": "a432c92b79bd86e55070d26930cec322973b53748802165aaf2091684d2fafed", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_001.mp3"}, {"id": "scene-026-ua-block-002", "position": 2, "text": "скорочується,", "text_sha256": "23116f21d19d4df894b549aa4c0286985dd77ea36f9803e1a1f13296ee918467", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_002.mp3"}, {"id": "scene-026-ua-block-003", "position": 3, "text": "деякі леопарди", "text_sha256": "d584abc7fb7315d5d2366003187e349d4b7648f1c546ecc4f12b402385a4491c", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_003.mp3"}, {"id": "scene-026-ua-block-004", "position": 4, "text": "починають полювати", "text_sha256": "268a3b0488b91f101b0cd9063a2c850f12b1285fcf4ee2a1637db31d6bbe14a7", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_004.mp3"}, {"id": "scene-026-ua-block-005", "position": 5, "text": "на домашню худобу", "text_sha256": "61b1b5590023708f56b15120f06ed87685b95f6011ad13298fd707b7c18395a5", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_005.mp3"}, {"id": "scene-026-ua-block-006", "position": 6, "text": "поблизу сіл", "text_sha256": "1ae06815e69a124783f214b97b88d8e944a1e3fb4364708b4cdf16eee840e889", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_006.mp3"}, {"id": "scene-026-ua-block-007", "position": 7, "text": "і пасовищ.", "text_sha256": "463cd357acd4916a1af097a2db556c784db7c0b7abe64a678bc474a3c35d59a4", "audio": "../../puzzle_audio_v2/blocks/ua/scene_026_block_ua_007.mp3"}]}}, {"scene": 27, "sentences": {"en": {"id": "scene-027-en-sentence", "text": "These encounters can lead to retaliatory killings by farmers and herders trying to protect their animals.", "text_sha256": "5f8dda32d9c252f04769def4e21dcfe9c1f40087bbc0e4049bd9b93d50008edb", "audio": "../../puzzle_audio_v2/sentences/en/scene_027_sentence_en.wav", "duration": 7.840667}, "ua": {"id": "scene-027-ua-sentence", "text": "Такі зустрічі можуть призводити до помстових убивств з боку фермерів і пастухів, які намагаються захистити своїх тварин.", "text_sha256": "8fb72e267424a8577affccce53a2a4506053a703ab5898ef46746b9c9ac5ab2a", "audio": "../../puzzle_audio_v2/sentences/ua/scene_027_sentence_ua.mp3", "duration": 7.992}}, "blocks": {"en": [{"id": "scene-027-en-block-001", "position": 1, "text": "These encounters", "text_sha256": "5e2a5ba85c02e228f9ff85e79008c27810e6a4ab244710c2d160f439ea19e5fb", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_001.wav"}, {"id": "scene-027-en-block-002", "position": 2, "text": "can lead", "text_sha256": "6160bef55e12fe3c87503df87f1a3209f1a157477bb00898bd81ad9c109b6cc0", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_002.wav"}, {"id": "scene-027-en-block-003", "position": 3, "text": "to retaliatory killings", "text_sha256": "19c67477b5c32e73ab85fcecae30a07c63801a6691ced2416e6b12094ce01f99", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_003.wav"}, {"id": "scene-027-en-block-004", "position": 4, "text": "by farmers and herders", "text_sha256": "deb1fa5d79ae766c1b32264a9759747d5132ff5df60f3157b238ed97219ededa", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_004.wav"}, {"id": "scene-027-en-block-005", "position": 5, "text": "trying", "text_sha256": "4dd6721b523ac6d7a0284668004856ab748e4692337ac19454cd7a53c64c507e", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_005.wav"}, {"id": "scene-027-en-block-006", "position": 6, "text": "to protect", "text_sha256": "f60cbb9cd2db254f264e406f4380630151620b404d96633f811041b3a43f8e2c", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_006.wav"}, {"id": "scene-027-en-block-007", "position": 7, "text": "their animals.", "text_sha256": "f60a72f3a9eb24c70b1722b5a8cbe700d9de79f9861a642e2b3a0ae21b887db1", "audio": "../../puzzle_audio_v2/blocks/en/scene_027_block_en_007.wav"}], "ua": [{"id": "scene-027-ua-block-001", "position": 1, "text": "Такі зустрічі", "text_sha256": "6a018f319cd60c28908bfd57cf2dd866117bbedbc3b674f1f2352f1ada3be161", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_001.mp3"}, {"id": "scene-027-ua-block-002", "position": 2, "text": "можуть призводити", "text_sha256": "dcb4a397f22f31dd2477a52b1cea33da78c19bd3bfd4c21bf544bf5be43c1cba", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_002.mp3"}, {"id": "scene-027-ua-block-003", "position": 3, "text": "до помстових убивств", "text_sha256": "4c856cf93671feeb7fd1cfcf429ed6fc50db59087359069ee0bf2911ea4528cc", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_003.mp3"}, {"id": "scene-027-ua-block-004", "position": 4, "text": "з боку фермерів і пастухів,", "text_sha256": "dd02ccbbcf0978ab5b21c29269cc0681c4e95f208d43eb83c37b7a2d49b5c900", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_004.mp3"}, {"id": "scene-027-ua-block-005", "position": 5, "text": "які намагаються", "text_sha256": "4761a4069a399fa9444a842b18e61c811a246d856adb31faa695cb99b7b69d7f", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_005.mp3"}, {"id": "scene-027-ua-block-006", "position": 6, "text": "захистити", "text_sha256": "4f02d6b2d0baa57af78c538df05617744828e0ab0afc3c78c016a4ff395e113b", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_006.mp3"}, {"id": "scene-027-ua-block-007", "position": 7, "text": "своїх тварин.", "text_sha256": "452f6c24fc0e222d102e2cef89663f91918ad23207d4d39633e3ea773c24f08c", "audio": "../../puzzle_audio_v2/blocks/ua/scene_027_block_ua_007.mp3"}]}}, {"scene": 28, "sentences": {"en": {"id": "scene-028-en-sentence", "text": "Illegal hunting also remains a serious threat, because leopard skins and body parts are still traded in some regions.", "text_sha256": "2f8990634ba651ed7c8eb2e768c0c5140d08bccd30fab7e91735ff7ca955547a", "audio": "../../puzzle_audio_v2/sentences/en/scene_028_sentence_en.wav", "duration": 7.243333}, "ua": {"id": "scene-028-ua-sentence", "text": "Незаконне полювання також залишається серйозною загрозою, адже в деяких регіонах досі торгують леопардовими шкурами та частинами тіла.", "text_sha256": "72e33b7e93eea5b562bd6f9f2840169b09f8d764527c09616f6783ac41bfce37", "audio": "../../puzzle_audio_v2/sentences/ua/scene_028_sentence_ua.mp3", "duration": 9.168}}, "blocks": {"en": [{"id": "scene-028-en-block-001", "position": 1, "text": "Illegal hunting", "text_sha256": "8f9f2a39933e2baea2277f542f4b1a3a37a978bba7e2ad8e5e1e9454073690af", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_001.wav"}, {"id": "scene-028-en-block-002", "position": 2, "text": "also remains", "text_sha256": "dc1b59ffd1f1260eab011d9453762c44cb35f4da3596dd8a004530ed0121e9c3", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_002.wav"}, {"id": "scene-028-en-block-003", "position": 3, "text": "a serious threat,", "text_sha256": "cc0a0cc6bae450f082f377d48c504aa44519789a5e99022b4d9715f70ac38f88", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_003.wav"}, {"id": "scene-028-en-block-004", "position": 4, "text": "because leopard skins", "text_sha256": "bb6c11fb1c5649bb0f17fd8443ec34c0ee1b05fa6a7c3c68074fec2c6dc20e2e", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_004.wav"}, {"id": "scene-028-en-block-005", "position": 5, "text": "and body parts", "text_sha256": "268ff3450b05dc8ccd51045be9da19aac164ec6cdee9f39a859fc69df1aae32f", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_005.wav"}, {"id": "scene-028-en-block-006", "position": 6, "text": "are still traded", "text_sha256": "99cb6d9eb5484846e827dc651a8c679b337b1c69040d242e75e120e8147cbb43", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_006.wav"}, {"id": "scene-028-en-block-007", "position": 7, "text": "in some regions.", "text_sha256": "d962f3a4f6f502a94296e744ee6905106ede5b96b41ea6752caac03948120bb4", "audio": "../../puzzle_audio_v2/blocks/en/scene_028_block_en_007.wav"}], "ua": [{"id": "scene-028-ua-block-001", "position": 1, "text": "Незаконне полювання", "text_sha256": "01e0fc7873b45e8447294f05f00b4b6b0f8f7c922662076583ac78033b6ce89a", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_001.mp3"}, {"id": "scene-028-ua-block-002", "position": 2, "text": "також залишається", "text_sha256": "212540df9b7a17824562fcae36df6d7f056ed0bfabf06b62b3f0cd8b3f780e12", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_002.mp3"}, {"id": "scene-028-ua-block-003", "position": 3, "text": "серйозною загрозою,", "text_sha256": "43d4fb0a2b817069eb45c8996ef9c26db1444c0932612f74f5dcd96a1e606f08", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_003.mp3"}, {"id": "scene-028-ua-block-004", "position": 4, "text": "адже в деяких регіонах", "text_sha256": "6fcd6871b29a2ac851bbe522cbb577792bfa5caaadcc3bf33443e09e1b35753e", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_004.mp3"}, {"id": "scene-028-ua-block-005", "position": 5, "text": "досі торгують", "text_sha256": "1a5fd15aa94c24e1c54819a6093419b112dbe68a53e35344c0f40238657724ce", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_005.mp3"}, {"id": "scene-028-ua-block-006", "position": 6, "text": "леопардовими шкурами", "text_sha256": "bd4ce799850ab5bc533afab9f1755dc5ba6c553183a2cdc33128327637d384b7", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_006.mp3"}, {"id": "scene-028-ua-block-007", "position": 7, "text": "та частинами тіла.", "text_sha256": "fec12bf12972d8073281345e79def6abaf722774492bd19af7df89a57706f681", "audio": "../../puzzle_audio_v2/blocks/ua/scene_028_block_ua_007.mp3"}]}}, {"scene": 29, "sentences": {"en": {"id": "scene-029-en-sentence", "text": "Conservationists now work with local communities to protect habitat, secure livestock, and reduce conflict between people and predators.", "text_sha256": "a458d4c15aca233f80b9ae7a5424026b7e171d9dbde0ee4d6849dfec4091e731", "audio": "../../puzzle_audio_v2/sentences/en/scene_029_sentence_en.wav", "duration": 8.171333}, "ua": {"id": "scene-029-ua-sentence", "text": "Сьогодні захисники природи співпрацюють із місцевими громадами, щоб зберігати середовище існування, захищати худобу та зменшувати конфлікти між людьми й хижаками.", "text_sha256": "c8b2242414d0cbeecce2d422d8bfb601977d1d4ed97b0ba02bb30a94b0282d44", "audio": "../../puzzle_audio_v2/sentences/ua/scene_029_sentence_ua.mp3", "duration": 10.824}}, "blocks": {"en": [{"id": "scene-029-en-block-001", "position": 1, "text": "Conservationists now work", "text_sha256": "b58a36beb9c9d542255a3cac31a071ef0705a8515fdfb4c39e32888460705ed6", "audio": "../../puzzle_audio_v2/blocks/en/scene_029_block_en_001.wav"}, {"id": "scene-029-en-block-002", "position": 2, "text": "with local communities", "text_sha256": "2060496f115dc75431428b6584db4c52efd3c2e8c04068cdddb31ca5157e64da", "audio": "../../puzzle_audio_v2/blocks/en/scene_029_block_en_002.wav"}, {"id": "scene-029-en-block-003", "position": 3, "text": "to protect habitat,", "text_sha25 function story(){q('title').textContent=DATA.title;q('summary').textContent=`${DATA.scene_count} sentences · ${DATA.direction}`;q('story').innerHTML='';DATA.scenes.forEach((s,i)=>{const b=document.createElement('button');b.className='sentence-link';b.textContent=s.sentences[target].text;const locked=s.scene>progress.unlockedThrough;b.classList.toggle('locked',locked);b.classList.toggle('done',completed.has(s.scene));b.disabled=locked;b.setAttribute('aria-disabled',String(locked));b.onclick=()=>open(i);if(!locked){b.onmouseenter=()=>play(s.sentences[target].audio,'hover');b.onmouseleave=()=>{if(audioKind==='hover')stopAudio()}}q('story').appendChild(b)});updateStoryProgress(audioKind==='story'?audio.currentTime:0)}
