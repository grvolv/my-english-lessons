<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ukrainian Web Trainer</title>
  <style>
    :root {
      --page: #f7f4ee;
      --paper: #fffdf8;
      --ink: #20201d;
      --muted: #6f6a60;
      --line: #ddd3c2;
      --accent: #2c6f73;
      --accent-dark: #1f5356;
      --accent-soft: #dbeeed;
      --mark: #f3d27b;
      --success: #4f7b45;
      --overlay: rgba(18, 20, 20, 0.58);
      --shadow: 0 24px 70px rgba(34, 31, 25, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(44, 111, 115, 0.08), transparent 28%, transparent 72%, rgba(137, 77, 55, 0.08)),
        var(--page);
    }

    .app {
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.84);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 46px 0 72px;
    }

    .story {
      background: var(--paper);
      border: 1px solid rgba(221, 211, 194, 0.78);
      border-radius: 8px;
      padding: clamp(28px, 5vw, 58px);
      box-shadow: 0 18px 46px rgba(42, 37, 28, 0.1);
    }

    .story-kicker {
      margin: 0;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .story-player {
      width: 100%;
      margin: 22px 0 2px;
      display: block;
    }

    .story-text {
      margin: 18px 0 0;
      font-size: clamp(24px, 3.1vw, 38px);
      line-height: 1.55;
      letter-spacing: 0;
    }

    .story-sentence {
      border-radius: 6px;
      cursor: pointer;
      outline: 0;
      padding: 2px 5px;
      margin: 0 -5px;
      transition: background 140ms ease, box-shadow 140ms ease, color 140ms ease;
    }

    .story-sentence:hover,
    .story-sentence:focus-visible {
      background: var(--mark);
      box-shadow: 0 0 0 4px rgba(243, 210, 123, 0.35);
    }

    .story-sentence.studied {
      color: var(--accent-dark);
      background: rgba(219, 238, 237, 0.74);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--overlay);
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      width: min(900px, 100%);
      max-height: min(720px, calc(100vh - 48px));
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }

    .dialog-head {
      min-height: 62px;
      padding: 16px 18px 14px 26px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf6;
    }

    .scene-label {
      margin: 0;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .icon-button {
      width: 40px;
      min-height: 40px;
      padding: 0;
      border-radius: 50%;
      font-size: 26px;
      line-height: 1;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .progress-wrap {
      padding: 18px 26px 0;
      background: #ffffff;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e7e0d5;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .content {
      max-height: 70vh;
      padding: clamp(40px, 6vh, 58px) clamp(28px, 5vw, 46px) clamp(28px, 5vw, 46px);
      display: grid;
      align-content: start;
      gap: 22px;
      overflow-y: auto;
    }

    .step-label {
      margin: 0;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .english {
      margin: 0;
      font-size: clamp(28px, 4.1vw, 46px);
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: 0;
    }

    .ukrainian {
      margin: 0;
      font-size: clamp(21px, 2.7vw, 30px);
      line-height: 1.2;
      color: #293136;
      font-weight: 700;
    }

    .hidden-note {
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
    }

    .translation {
      min-height: 82px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .controls {
      border-top: 1px solid var(--line);
      padding: 18px 26px;
      display: grid;
      grid-template-columns: 132px 1fr 132px;
      gap: 14px;
      align-items: center;
      background: #fbfaf6;
    }

    .center-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      min-width: 0;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      min-height: 46px;
      padding: 0 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      background: #8da5ad;
      border-color: #8da5ad;
    }

    .secondary {
      background: #fff;
      color: var(--accent);
    }

    .secondary:hover {
      background: #eef7f9;
      color: var(--accent-dark);
    }

    .success {
      border-color: var(--success);
      background: var(--success);
    }

    .controls.final-step {
      grid-template-columns: 132px 1fr;
    }

    .controls.final-step .center-actions {
      grid-column: 2;
    }

    .controls.final-step #backButton {
      grid-column: 1;
    }

    .controls.final-step #nextButton {
      display: block;
      grid-column: 1 / -1;
      grid-row: 2;
    }

    .return-button {
      width: 100%;
      min-height: 64px;
      border-color: var(--success);
      background: var(--success);
      font-size: 20px;
    }

    .return-button:hover {
      background: #3f6537;
    }

    @media (max-width: 720px) {
      .topbar {
        min-height: 64px;
        align-items: flex-start;
        justify-content: center;
        flex-direction: column;
        padding: 12px 0;
      }

      .counter { white-space: normal; }

      main {
        padding: 20px 0 34px;
      }

      .story {
        padding: 24px 20px;
      }

      .modal {
        padding: 12px;
      }

      .dialog {
        max-height: calc(100vh - 24px);
      }

      .controls {
        grid-template-columns: 1fr 1fr;
        padding: 14px;
      }

      .center-actions {
        grid-column: 1 / -1;
        grid-row: 1;
        flex-wrap: wrap;
      }

      .controls > button:first-child { grid-column: 1; }
      .controls > button:last-child { grid-column: 2; }

      .controls.final-step {
        grid-template-columns: 1fr 1fr;
      }

      .controls.final-step .center-actions {
        grid-column: 2;
        grid-row: 1;
      }

      .controls.final-step #backButton {
        grid-column: 1;
        grid-row: 1;
      }

      .controls.final-step #nextButton {
        grid-column: 1 / -1;
        grid-row: 2;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <h1 id="title">Ukrainian Web Trainer</h1>
        <div class="counter" id="storyCounter"></div>
      </div>
    </header>

    <main>
      <section class="story" aria-labelledby="title">
        <p class="story-kicker" id="storyKicker"></p>
        <audio class="story-player" controls src="full_story_ua.wav"></audio>
        <p class="story-text" id="storyText" lang="uk"></p>
      </section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="sceneLabel">
      <div class="dialog-head">
        <p class="scene-label" id="sceneLabel"></p>
        <button class="secondary icon-button" id="closeButton" aria-label="Close">×</button>
      </div>

      <div class="progress-wrap">
        <div class="progress"><span id="progress"></span></div>
      </div>

      <div class="content" aria-live="polite">
        <p class="step-label" id="stepLabel"></p>
        <p class="english" id="englishText" lang="uk"></p>
        <div class="translation" id="translationBox"></div>
      </div>

      <div class="controls">
        <button class="secondary" id="backButton">Back</button>
        <div class="center-actions">
          <button id="revealButton">Show Translation</button>
          <button class="secondary" id="replayButton">Replay Audio</button>
        </div>
        <button id="nextButton">Next</button>
      </div>
    </section>
  </div>

: "свіжу траву й воду,", "audio_en": "audio/scene_24_phrase_2_en.wav", "audio_ua": "audio/scene_24_phrase_2_ua.mp3"}, {"en": "but many routes are increasingly", "ua": "але багато маршрутів дедалі", "audio_en": "audio/scene_24_phrase_3_en.wav", "audio_ua": "audio/scene_24_phrase_3_ua.mp3"}, {"en": "disrupted by human development.", "ua": "більше порушуються людською діяльністю.", "audio_en": "audio/scene_24_phrase_4_en.wav", "audio_ua": "audio/scene_24_phrase_4_ua.mp3"}], "sentence": {"en": "These movements help the animals reach fresh grass and water, but many routes are increasingly disrupted by human development.", "ua": "Ці переміщення допомагають тваринам знаходити свіжу траву й воду, але багато маршрутів дедалі більше порушуються людською діяльністю.", "audio_en": "audio/scene_24_sentence_en.wav", "audio_ua": "audio/scene_24_sentence_ua.mp3"}}, {"scene": 25, "phrases": [{"en": "Roads, farms, and fences can", "ua": "Дороги, ферми й паркани можуть", "audio_en": "audio/scene_25_phrase_1_en.wav", "audio_ua": "audio/scene_25_phrase_1_ua.mp3"}, {"en": "divide open rangelands and prevent", "ua": "розділяти відкриті пасовища та не", "audio_en": "audio/scene_25_phrase_2_en.wav", "audio_ua": "audio/scene_25_phrase_2_ua.mp3"}, {"en": "herds from reaching important", "ua": "дозволяти стадам діставатися важливих", "audio_en": "audio/scene_25_phrase_3_en.wav", "audio_ua": "audio/scene_25_phrase_3_ua.mp3"}, {"en": "grazing areas and rivers.", "ua": "кормових ділянок і річок.", "audio_en": "audio/scene_25_phrase_4_en.wav", "audio_ua": "audio/scene_25_phrase_4_ua.mp3"}], "sentence": {"en": "Roads, farms, and fences can divide open rangelands and prevent herds from reaching important grazing areas and rivers.", "ua": "Дороги, ферми й паркани можуть розділяти відкриті пасовища та не дозволяти стадам діставатися важливих кормових ділянок і річок.", "audio_en": "audio/scene_25_sentence_en.wav", "audio_ua": "audio/scene_25_sentence_ua.mp3"}}, {"scene": 26, "phrases": [{"en": "Severe hrases": [{"en": "As young males mature, many leave", "ua": "Коли молоді самці дорослішають, багато з", "audio_en": "audio/scene_28_phrase_1_en.wav", "audio_ua": "audio/scene_28_phrase_1_ua.mp3"}, {"en": "their family units and join", "ua": "них залишають сімейні групи й", "audio_en": "audio/scene_28_phrase_2_en.wav", "audio_ua": "audio/scene_28_phrase_2_ua.mp3"}, {"en": "bachelor groups before attempting to", "ua": "приєднуються до холостяцьких груп, перш", "audio_en": "audio/scene_28_phrase_3_en.wav", "audio_ua": "audio/scene_28_phrase_3_ua.mp3"}, {"en": "form harems of their own.", "ua": "ніж намагатися створити власні гареми.", "audio_en": "audio/scene_28_phrase_4_en.wav", "audio_ua": "audio/scene_28_phrase_4_ua.mp3"}], "sentence": {"en": "As young males mature, many leave their family units and join bachelor groups before attempting to form harems of their own.", "ua": "Коли молоді самці дорослішають, багато з них залишають сімейні групи й приєднуються до холостяцьких груп, перш ніж намагатися створити власні гареми.", "audio_en": "audio/scene_28_sentence_en.wav", "audio_ua": "audio/scene_28_sentence_ua.mp3"}}, {"scene": 29, "phrases": [{"en": "Young females may transfer", "ua": "Молоді самки можуть переходити", "audio_en": "audio/scene_29_phrase_1_en.wav", "audio_ua": "audio/scene_29_phrase_1_ua.mp3"}, {"en": "to different harems, helping", "ua": "до інших гаремів,", "audio_en": "audio/scene_29_phrase_2_en.wav", "audio_ua": "audio/scene_29_phrase_2_ua.mp3"}, {"en": "maintain genetic exchange", "ua": "підтримуючи генетичний обмін", "audio_en": "audio/scene_29_phrase_3_en.wav", "audio_ua": "audio/scene_29_phrase_3_ua.mp3"}, {"en": "between family groups.", "ua": "між сімейними групами.", "audio_en": "audio/scene_29_phrase_4_en.wav", "audio_ua": "audio/scene_29_phrase_4_ua.mp3"}], "sentence": {"en": "Young females may transfer to different harems, helping maintain genetic exchange between family groups.", "ua": "Молоді самки можуть переходити до інших гаремів, підтримуючи генетичний обмін між сімейними групами.", "audio_en": "audio/scene_29_sentence_en.wav", "audio_ua": "audio/scene_29_sentence_ua.mp3"}}, {"scene": 30, "phrases": [{"en": "Through strong social bonds, flexible", "ua": "Завдяки міцним соціальним зв'язкам, гнучкому", "audio_en": "audio/scene_30_phrase_1_en.wav", "audio_ua": "audio/scene_30_phrase_1_ua.mp3"}, {"en": "feeding, and constant movement, plains", "ua": "харчуванню й постійному руху рівнинні", "audio_en": "audio/scene_30_phrase_2_en.wav", "audio_ua": "audio/scene_30_phrase_2_ua.mp3"}, {"en": "zebras remain one of Africa's", "ua": "зебри залишаються одними з", "audio_en": "audio/scene_30_phrase_3_en.wav", "audio_ua": "audio/scene_30_phrase_3_ua.mp3"}, {"en": "most recognizable grazing animals.", "ua": "найвідоміших пасовищних тварин Африки.", "audio_en": "audio/scene_30_phrase_4_en.wav", "audio_ua": "audio/scene_30_phrase_4_ua.mp3"}], "sentence": {"en": "Through strong social bonds, flexible feeding, and constant movement, plains zebras remain one of Africa's most recognizable grazing animals.", "ua": "Завдяки міцним соціальним зв'язкам, гнучкому харчуванню й постійному руху рівнинні зебри залишаються одними з найвідоміших пасовищних тварин Африки.", "audio_en": "audio/scene_30_sentence_en.wav", "audio_ua": "audio/scene_30_sentence_ua.mp3"}}]};
    let trainer = null;
    let activeSceneIndex = null;
    let currentStep = 0;
    let revealed = new Set();
    let audio = new Audio();
    let hoverAudio = new Audio();
    let lastSentenceEl = null;

    const titleEl = document.getElementById('title');
    const storyCounterEl = document.getElementById('storyCounter');
    const storyKickerEl = document.getElementById('storyKicker');
    const storyTextEl = document.getElementById('storyText');
    const modalEl = document.getElementById('modal');
    const sceneLabelEl = document.getElementById('sceneLabel');
    const progressEl = document.getElementById('progress');
    const stepLabelEl = document.getElementById('stepLabel');
    const englishTextEl = document.getElementById('englishText');
    const translationBoxEl = document.getElementById('translationBox');
    const controlsEl = document.querySelector('.controls');
    const backButton = document.getElementById('backButton');
    const nextButton = document.getElementById('nextButton');
    const revealButton = document.getElementById('revealButton');
    const replayButton = document.getElementById('replayButton');
    const closeButton = document.getElementById('closeButton');

    function sceneSteps(scene) {
      const steps = scene.phrases.map((phrase, index) => ({
        type: 'phrase',
        scene: scene.scene,
        phrase: index + 1,
        en: phrase.en,
        ua: phrase.ua,
        audioEn: phrase.audio_en,
        audioUa: phrase.audio_ua
      }));
      steps.push({
          type: 'sentence',
          scene: scene.scene,
          phrase: null,
          en: scene.sentence.en,
          ua: scene.sentence.ua,
          audioEn: scene.sentence.audio_en,
          audioUa: scene.sentence.audio_ua
      });
      return steps;
    }

    function play(src) {
      if (!src) return;
      audio.pause();
      audio = new Audio(src);
      audio.play().catch(() => {});
    }

    function stopMainAudio() {
      audio.pause();
      audio.currentTime = 0;
    }

    function playHover(src) {
      if (!src || activeSceneIndex !== null) return;
      hoverAudio.pause();
      hoverAudio = new Audio(src);
      hoverAudio.play().catch(() => {});
    }

    function stopHoverAudio() {
      hoverAudio.pause();
      hoverAudio.currentTime = 0;
    }

    function current() {
      if (activeSceneIndex === null) return null;
      return trainer.scenes[activeSceneIndex].steps[currentStep];
    }

    function stepKey(index = currentStep) {
      if (activeSceneIndex === null) return '';
      return `${activeSceneIndex}:${index}`;
    }

    function updateNavigation(isFinalStep) {
      backButton.disabled = currentStep === 0;
      nextButton.disabled = false;
      nextButton.hidden = false;
      nextButton.textContent = isFinalStep ? 'Return to Text' : 'Next';
      nextButton.setAttribute('aria-label', isFinalStep ? 'Return to Text' : 'Next');
      nextButton.classList.toggle('return-button', isFinalStep);
      controlsEl.classList.toggle('final-step', isFinalStep);
    }

    function renderStory() {
      titleEl.textContent = trainer.title;
      storyCounterEl.textContent = `${trainer.scene_count} sentences`;
      storyKickerEl.textContent = trainer.title;
      storyTextEl.innerHTML = '';

      trainer.scenes.forEach((scene, index) => {
        const span = document.createElement('span');
        span.className = 'story-sentence';
        span.tabIndex = 0;
        span.role = 'button';
        span.dataset.sceneIndex = String(index);
        span.textContent = scene.sentence.ua;

        span.addEventListener('mouseenter', () => playHover(scene.sentence.audio_ua));
        span.addEventListener('mouseleave', stopHoverAudio);
        span.addEventListener('click', () => {
          stopHoverAudio();
          openScene(index, span);
        });
        span.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            stopHoverAudio();
            openScene(index, span);
          }
        });

        storyTextEl.appendChild(span);
        storyTextEl.appendChild(document.createTextNode(' '));
      });
    }

    function render(options = {}) {
      const step = current();
      if (!step) return;
      const isRevealed = revealed.has(stepKey());
      const total = trainer.scenes[activeSceneIndex].steps.length;
      const isFinalStep = currentStep === total - 1;
      const label = step.type === 'sentence'
        ? `Scene ${step.scene} / final sentence`
        : `Scene ${step.scene} / phrase ${step.phrase} of 4`;

      sceneLabelEl.textContent = `Scene ${step.scene}`;
      progressEl.style.width = `${((currentStep + 1) / total) * 100}%`;
      stepLabelEl.textContent = label;
      englishTextEl.textContent = step.ua;

      translationBoxEl.innerHTML = '';
      if (isRevealed) {
        const p = document.createElement('p');
        p.className = 'ukrainian';
        p.setAttribute('lang', 'en');
        p.textContent = step.en;
        translationBoxEl.appendChild(p);
      } else {
        const p = document.createElement('div');
        p.className = 'hidden-note';
        p.textContent = 'Translation hidden';
        translationBoxEl.appendChild(p);
      }

      updateNavigation(isFinalStep);
      revealButton.disabled = isRevealed;
      revealButton.className = isRevealed ? 'success' : '';
      revealButton.textContent = isRevealed ? 'Translation Shown' : 'Show Translation';

      if (options.autoplay !== false) {
        play(step.audioUa);
      }
    }

    function openScene(sceneIndex, sentenceEl) {
      stopHoverAudio();
      stopMainAudio();
      activeSceneIndex = sceneIndex;
      currentStep = 0;
      revealed.clear();
      lastSentenceEl = sentenceEl;
      modalEl.classList.add('open');
      modalEl.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      render();
      revealButton.focus();
    }

    function closeScene() {
      stopHoverAudio();
      stopMainAudio();
      const completed = activeSceneIndex !== null
        && currentStep === trainer.scenes[activeSceneIndex].steps.length - 1;
      if (completed && lastSentenceEl) {
        lastSentenceEl.classList.add('studied');
      }
      activeSceneIndex = null;
      currentStep = 0;
      revealed.clear();
      nextButton.classList.remove('return-button');
      nextButton.textContent = 'Next';
      nextButton.setAttribute('aria-label', 'Next');
      controlsEl.classList.remove('final-step');
      modalEl.classList.remove('open');
      modalEl.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (lastSentenceEl) {
        lastSentenceEl.focus();
      }
    }

    backButton.addEventListener('click', () => {
      if (currentStep === 0) return;
      currentStep -= 1;
      revealed.clear();
      render();
    });

    nextButton.addEventListener('click', () => {
      const total = trainer.scenes[activeSceneIndex].steps.length;
      if (currentStep >= total - 1) {
        closeScene();
        return;
      }
      currentStep += 1;
      render();
    });

    revealButton.addEventListener('click', () => {
      revealed.add(stepKey());
      render({ autoplay: false });
      play(current().audioEn);
    });

    replayButton.addEventListener('click', () => {
      const step = current();
      if (!step) return;
      play(revealed.has(stepKey()) ? step.audioEn : step.audioUa);
    });

    closeButton.addEventListener('click', closeScene);

    modalEl.addEventListener('click', (event) => {
      if (event.target === modalEl) closeScene();
    });

    window.addEventListener('keydown', (event) => {
      if (activeSceneIndex === null) return;
      if (event.key === 'Escape') closeScene();
      if (event.key === 'ArrowLeft') backButton.click();
      if (event.key === 'ArrowRight') nextButton.click();
      if ((event.key === ' ' || event.key === 'Enter') && !event.target.closest('button')) {
        event.preventDefault();
        revealButton.click();
      }
    });

    trainer = {
      ...EMBEDDED_TRAINER_DATA,
      scenes: EMBEDDED_TRAINER_DATA.scenes.map((scene) => ({ ...scene, steps: sceneSteps(scene) }))
    };
    renderStory();
  </script>
